<div id="lockGate" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#080808] p-6">

<span class="material-symbols-outlined text-primary-container text-[32px]" style="font-variation-settings:'FILL' 1;">lock</span>
<span class="font-label-caps text-label-caps text-tertiary-container tracking-widest border border-tertiary-container/30 px-3 py-1 rounded-full bg-tertiary-container/10">LEX-CON</span>

<h1 class="font-display-xl text-3xl text-primary mb-2">접근 잠금</h1>
<p class="text-on-surface-variant text-sm mb-6">계속하려면 암호를 입력하세요.</p>
<input id="lockInput" type="password" inputmode="numeric" autocomplete="off" placeholder="암호" class="w-full bg-surface-container-high border-b border-outline-variant text-on-surface font-data-mono text-data-mono py-3 px-4 rounded-lg focus:outline-none focus:border-primary-container focus:shadow-[0_1px_10px_rgba(204,255,0,0.2)] transition-all placeholder:text-outline"/>
<p id="lockError" class="text-error text-sm mt-2 h-5"></p>
<button id="lockBtn" class="mt-2 w-full bg-primary-container text-on-primary-container font-label-caps text-label-caps py-3 rounded-full hover:bg-primary-fixed-dim transition-colors uppercase tracking-wider">잠금 해제</button>
</div>

<script>
(function () {
  "use strict";
  var PW = '1111';
  var KEY = 'lexcon_unlocked';
  var gate = document.getElementById('lockGate');
  function unlock() {
    try { sessionStorage.setItem(KEY, '1'); } catch (e) {}
    if (gate && gate.parentNode) gate.parentNode.removeChild(gate);
  }
  var ok = false;
  try { ok = sessionStorage.getItem(KEY) === '1'; } catch (e) {}
  if (ok) { unlock(); return; }
  var input = document.getElementById('lockInput');
  var btn = document.getElementById('lockBtn');
  var err = document.getElementById('lockError');
  function attempt() {
    if (input.value === PW) { unlock(); }
    else { err.textContent = '암호가 올바르지 않습니다.'; input.value = ''; input.focus(); }
  }
  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', function (e) { if (e.key === 'Enter') attempt(); });
  input.focus();
})();
</script>

<script>
(function () {
  "use strict";
  var DATA = JSON.parse(document.getElementById('lawdata').textContent || 'null');
  if (!DATA) { return; }
  var ARTICLES = DATA.articles;
  ARTICLES.forEach(function (a, i) { a.id = i; });
  var LAWS = DATA.laws;
  var LAW_ORDER = {}; LAWS.forEach(function (l, i) { LAW_ORDER[l.key] = i; });

  var QUICK = ['비계','추락 방지','굴착','거푸집 동바리','안전난간','밀폐공간','전기','크레인','안전모','도급','안전보건교육','중대재해'];

  // 현장용어 -> 법령용어 동의어/연관어 매핑 (양방향으로 확장)
  var SYNONYMS = [
    ['낙하', '추락', '떨어짐', '비래'],
    ['넘어짐', '전도', '미끄러짐'],
    ['무너짐', '붕괴', '도괴'],
    ['끼임', '협착'],
    ['감전', '전기', '충전부'],
    ['질식', '밀폐공간', '산소결핍'],
    ['소음', '청력', '난청'],
    ['분진', '먼지', '분진작업'],
    ['사다리', '이동식사다리'],
    ['고소작업', '높은곳', '추락'],
    ['중장비', '차량계', '건설기계'],
    ['지게차', '차량계하역운반기계'],
    ['용접', '화기', '불티'],
    ['보호구', '안전모', '안전대', '보안경'],
    ['교육', '안전보건교육'],
    ['하청', '도급', '수급인', '관계수급인'],
    ['설치기준', '구조', '설치', '기준'],
    ['강관비계', '강관', '비계']
  ];
  var SYN_MAP = {};
  function nrm(s) { return String(s).toLowerCase().replace(/\s+/g, ''); }
  SYNONYMS.forEach(function (grp) {
    grp.forEach(function (w) {
      var key = nrm(w);
      SYN_MAP[key] = (SYN_MAP[key] || []).concat(grp.map(nrm));
    });
  });

  // 각 조문에 정규화(공백제거) 검색 필드를 미리 계산해 둔다
  ARTICLES.forEach(function (a) {
    a._head = nrm(a.article + a.title);
    a._body = nrm(a.body);
    a._all = a._head + a._body;
  });

  var state = { filter: 'all', results: [], selectedId: null, checks: {}, tokens: [] };

  // ---------- utils ----------
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function tokenize(q) {
    return (q || '').trim().split(/\s+/).filter(function (t) { return t.length > 0; });
  }
  // 강조: 토큰과 그 구성 글자 사이에 공백이 끼어 있어도 매칭되도록 \s* 삽입
  function highlight(text, tokens) {
    var html = esc(text);
    var terms = highlightTerms(tokens);
    terms.forEach(function (t) {
      if (!t || t.length < 1) return;
      var pat = t.split('').map(function (ch) { return ch.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }).join('\\s*');
      var re = new RegExp('(' + pat + ')', 'gi');
      html = html.replace(re, '<mark>$1</mark>');
    });
    return html;
  }
  // 강조 대상 = 입력 토큰 + 동의어 + 길이가 긴 합성어의 분해 토큰
  function highlightTerms(tokens) {
    var set = {};
    (tokens || []).forEach(function (t) {
      var k = nrm(t);
      if (k.length >= 2) set[k] = 1;
      (SYN_MAP[k] || []).forEach(function (s) { if (s.length >= 2) set[s] = 1; });
    });
    return Object.keys(set);
  }
  function countOccur(hay, needle) {
    if (!needle) return 0;
    var n = 0, idx = 0;
    while ((idx = hay.indexOf(needle, idx)) !== -1) { n++; idx += needle.length; }
    return n;
  }
  // 한 토큰을 검색용 변형들로 확장: 자기 자신 + 동의어 + (합성어면) 2글자 단위 분해
  function expandToken(t) {
    var base = nrm(t);
    var variants = {};
    if (base.length >= 2) variants[base] = 3;            // 원형: 가중치 높음
    (SYN_MAP[base] || []).forEach(function (s) { if (!variants[s]) variants[s] = 2; });
    if (base.length >= 4) {                               // 합성어 분해 (예: 설치기준 -> 설치, 기준)
      for (var i = 0; i + 2 <= base.length; i += 2) {
        var part = base.slice(i, i + 2);
        if (!variants[part]) variants[part] = 1;
      }
    }
    return variants; // { 변형: 가중치 }
  }

  // ---------- search ----------
  // 입력을 그대로 다 만족하지 않아도(부분 일치) 관련 조문을 찾아 관련도순으로 보여준다.
  // 각 입력어를 동의어/분해 변형으로 확장하고, 더 많은 입력어를 충족할수록 상위로 정렬.
  function search() {
    var qToks = state.tokens;
    var pool = ARTICLES.filter(function (a) {
      return state.filter === 'all' || a.lawKey === state.filter;
    });
    var scored = [];
    if (qToks.length) {
      var expanded = qToks.map(expandToken); // [{variant: weight}, ...]
      pool.forEach(function (a) {
        var total = 0, coverage = 0;
        for (var i = 0; i < expanded.length; i++) {
          var vars = expanded[i], best = 0;
          for (var v in vars) {
            var w = vars[v], s = 0;
            if (a._head.indexOf(v) !== -1) s += 100 * w;
            s += countOccur(a._body, v) * w;
            if (s > best) best = s;
          }
          if (best > 0) { coverage++; total += best; }
        }
        if (coverage > 0) { scored.push({ a: a, score: total + coverage * 200, coverage: coverage }); }
      });
      scored.sort(function (x, y) {
        if (y.coverage !== x.coverage) return y.coverage - x.coverage;
        if (y.score !== x.score) return y.score - x.score;
        if (LAW_ORDER[x.a.lawKey] !== LAW_ORDER[y.a.lawKey]) return LAW_ORDER[x.a.lawKey] - LAW_ORDER[y.a.lawKey];
        if (x.a.jo !== y.a.jo) return x.a.jo - y.a.jo;
        return x.a.sub - y.a.sub;
      });
    }
    state.results = scored;
    renderResults();
    if (scored.length) {
      selectArticle(scored[0].a.id);
    } else {
      renderEmptyDetail();
    }
  }

  // ---------- results list ----------
  function renderResults() {
    var count = state.results.length;
    document.getElementById('resultCount').textContent = '검색 결과 (' + count + '건)';
    var box = document.getElementById('resultList');
    if (count === 0) {
      box.innerHTML = quickStartHtml();
      bindQuick();
      return;
    }
    var maxScore = state.results[0].score || 1;
    var html = state.results.slice(0, 100).map(function (r) {
      var a = r.a;
      var pct = Math.max(50, Math.min(99, Math.round(50 + 49 * (r.score / maxScore))));
      var active = a.id === state.selectedId;
      var preview = a.body.replace(/\s+/g, ' ').trim();
      if (active) {
        return '' +
          '<div class="glass-card rounded-xl p-4 cursor-pointer neon-glow border-primary-container/50 relative overflow-hidden group" data-id="' + a.id + '">' +
          '<div class="absolute top-0 right-0 w-16 h-16 bg-primary-container/10 rounded-bl-full -mr-8 -mt-8 group-hover:bg-primary-container/20 transition-all"></div>' +
          '<div class="flex justify-between items-start mb-2">' +
          '<span class="bg-primary-container text-on-primary-container font-label-caps text-[10px] px-2 py-1 rounded-sm">' + pct + '% MATCH</span>' +

          '<h3 class="font-title-md text-title-md text-primary mb-1">' + highlight(a.article + ': ' + a.title, state.tokens) + '</h3>' +
          '<p class="text-on-surface-variant text-sm line-clamp-2 mt-2">' + highlight(preview, state.tokens) + '</p>' +
          '</div>';
      }
      return '' +
        '<div class="glass-card rounded-xl p-4 cursor-pointer hover:bg-surface-container-low transition-colors group opacity-70 hover:opacity-100" data-id="' + a.id + '">' +
        '<div class="flex justify-between items-start mb-2">' +
        '<span class="bg-surface-variant text-on-surface-variant font-label-caps text-[10px] px-2 py-1 rounded-sm border border-outline-variant/50">' + pct + '% MATCH</span>' +
        '<span class="text-outline font-data-mono text-[12px]">' + esc(a.law) + '</span>' +
        '</div>' +
        '<h3 class="font-title-md text-title-md text-on-surface mb-1">' + highlight(a.article + ': ' + a.title, state.tokens) + '</h3>' +
        '<p class="text-on-surface-variant text-sm line-clamp-2 mt-2">' + highlight(preview, state.tokens) + '</p>' +
        '</div>';
    }).join('');
    box.innerHTML = html;
    Array.prototype.forEach.call(box.querySelectorAll('[data-id]'), function (el) {
      el.addEventListener('click', function () { selectArticle(parseInt(el.getAttribute('data-id'), 10)); });
    });
  }

  function quickStartHtml() {
    var chips = QUICK.map(function (q) {
      return '<button class="quick-chip bg-[#080808] border-2 border-tertiary-container/70 text-tertiary-container font-label-caps text-label-caps px-3 py-2 rounded-full hover:bg-tertiary-container/10 hover:border-tertiary-container transition-colors" data-q="' + esc(q) + '">' + esc(q) + '</button>';
    }).join('');
    return '' +
      '<div class="glass-card rounded-xl p-5">' +
      '<div class="font-label-caps text-label-caps text-secondary-container uppercase tracking-widest mb-3">자주 찾는 항목</div>' +
      '<div class="flex flex-wrap gap-2">' + chips + '</div>' +
      '<p class="text-outline text-sm mt-4 font-data-mono">' + ARTICLES.length + '개 조문 · 검색어를 입력하세요</p>' +
      '</div>';
  }
  function bindQuick() {
    Array.prototype.forEach.call(document.querySelectorAll('.quick-chip'), function (el) {
      el.addEventListener('click', function () {
        var q = el.getAttribute('data-q');
        document.getElementById('searchInput').value = q;
        state.tokens = tokenize(q);
        search();
      });
    });
  }

  // ---------- clause / checklist parsing ----------
  var CIRCLED = '①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳';
  function splitClauses(body) {
    var t = body;
    // ensure each 항(circled) starts on its own line
    for (var i = 0; i < CIRCLED.length; i++) {
      var ch = CIRCLED[i];
      t = t.split(ch).join('\n' + ch);
    }
    var lines = t.split(/\n+/);
    var out = [];
    lines.forEach(function (ln) {
      ln = ln.trim();
      if (ln) out.push(ln);
    });
    return out;
  }

  var OBL = /(할 것|하여야 한다|해야 한다|받아야 한다|두어야 한다|갖추어야 한다|마련해야 한다|마련하여야 한다|준수해야 한다|준수하여야 한다|실시해야 한다|실시하여야 한다|해서는 아니 된다|하여서는 아니 된다|아니 된다|지켜야 한다|확인해야 한다|확인하여야 한다|점검해야 한다|착용하여야 한다|착용해야 한다|설치해야 한다|설치하여야 한다|조치해야 한다|조치하여야 한다)/;
  var EXC = /(할 수 없다|예외로 한다|하지 아니할 수 있다)/;

  function sentenceSplit(clause) {
    // split on '다.' boundaries while keeping '할 것' segments
    var parts = clause.split(/(?<=다\.)\s+(?=[가-힣0-9①-⑳「(])/);
    var res = [];
    parts.forEach(function (p) { p = p.trim(); if (p) res.push(p); });
    return res;
  }

  function buildChecklist(article) {
    var items = [];
    var seen = {};
    var clauses = splitClauses(article.body);
    clauses.forEach(function (cl) {
      sentenceSplit(cl).forEach(function (s) {
        if (OBL.test(s) && !EXC.test(s)) {
          // build label: strip <개정...>, cut at 다만 / 단서
          var label = s.replace(/<[^>]*>/g, '').trim();
          var cut = label.search(/다만|단서/);
          if (cut > 12) label = label.slice(0, cut).trim();
          label = label.replace(/[\s·]+$/, '');
          if (label.length > 64) label = label.slice(0, 62) + '…';
          var key = label.slice(0, 40);
          if (!seen[key] && label.length >= 6) { seen[key] = 1; items.push({ label: label, full: s }); }
        }
      });
    });
    return items;
  }

  function extractMetrics(body) {
    var re = /(\d+(?:\.\d+)?)\s*(밀리미터|미리미터|센티미터|미터|킬로그램|킬로그램중|퍼센트|볼트|와트|럭스|데시벨|시간|개월|일|년|명|배|도)\s*(이하|이상|초과|미만|이내)?/g;
    var found = [], seen = {}, m;
    while ((m = re.exec(body)) !== null) {
      var val = m[1] + ' ' + m[2] + (m[3] ? ' ' + m[3] : '');
      if (!seen[val]) { seen[val] = 1; found.push(val); }
      if (found.length >= 3) break;
    }
    return found;
  }

  // ---------- detail view ----------
  var ACCENTS = ['secondary-container', 'tertiary-container', 'primary-container'];
  function clauseLabel(text) {
    var m = text.match(/^([①-⑳])/);
    if (m) return m[1] + ' 항';
    m = text.match(/^(\d+)\.\s/);
    if (m) return '제' + m[1] + '호';
    m = text.match(/^([가-힣])\.\s/);
    if (m) return m[1] + '. 목';
    return '본문';
  }

  function selectArticle(id) {
    state.selectedId = id;
    state.checks = {};
    renderResults();
    var a = ARTICLES.filter(function (x) { return x.id === id; })[0];
    if (!a) { renderEmptyDetail(); return; }
    renderDetail(a);
    renderChecklist(a);
  }

  function renderEmptyDetail() {
    document.getElementById('detailView').innerHTML = '' +
      '<div class="glass-card rounded-2xl p-8 border-l-4 border-l-tertiary-container">' +
      '<div class="flex items-center gap-3 mb-4"><span class="material-symbols-outlined text-tertiary-container text-[32px]">search</span>' +
      '<span class="font-label-caps text-label-caps text-tertiary-container tracking-widest border border-tertiary-container/30 px-3 py-1 rounded-full bg-tertiary-container/10">LEX-CON</span></div>' +
      '<h1 class="font-display-xl text-display-xl text-primary mb-2">검색어를 입력하세요</h1>' +
      '<p class="font-body-lg text-body-lg text-on-surface-variant">현장 용어(비계, 추락, 굴착 등)로 검색하면 관련 법 조문과 현장 조치 체크리스트를 보여줍니다.</p>' +
      '</div>';
    document.getElementById('questList').innerHTML = '';
    setProgress(0);
  }

  function renderDetail(a) {
    var clauses = splitClauses(a.body);
    var metrics = extractMetrics(a.body);
    var subtitle = a.chapter ? esc(a.chapter) : esc(a.law);

    var cards = clauses.map(function (cl, idx) {
      var accent = ACCENTS[idx % ACCENTS.length];
      var num = (idx + 1 < 10 ? '0' : '') + (idx + 1);
      var label = clauseLabel(cl);
      var span2 = (idx === clauses.length - 1 && clauses.length % 2 === 1) ? ' lg:col-span-2' : '';
      var bodyHtml = neonNumbers(highlight(cl, state.tokens));
      return '' +
        '<div class="glass-card rounded-xl p-6 relative' + span2 + '">' +
        '<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-' + accent + ' to-transparent opacity-50"></div>' +
        '<div class="font-data-mono text-' + accent + ' text-2xl mb-4 font-bold">' + num + '</div>' +
        '<h4 class="font-title-md text-title-md text-on-surface mb-3">' + esc(label) + '</h4>' +
        '<p class="text-on-surface-variant leading-relaxed">' + bodyHtml + '</p>' +
        '</div>';
    }).join('');

    var statBlock = '';
    if (metrics.length) {
      var cells = [];
      var colors = ['text-primary-container neon-text-glow', 'text-tertiary-container', 'text-secondary-container'];
      metrics.forEach(function (mv, i) {
        if (i > 0) cells.push('<div class="h-8 w-[1px] bg-outline-variant"></div>');
        cells.push('<div class="flex flex-col"><span class="font-label-caps text-label-caps text-outline mb-1">기준 ' + (i + 1) + '</span>' +
          '<span class="font-data-mono ' + colors[i % colors.length] + ' text-xl font-bold">' + esc(mv) + '</span></div>');
      });
      statBlock = '<div class="glass-card rounded-xl p-6 relative lg:col-span-2">' +
        '<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary-container to-transparent opacity-50"></div>' +
        '<h4 class="font-title-md text-title-md text-on-surface mb-3">핵심 수치 기준</h4>' +
        '<div class="bg-surface-container-highest rounded-lg p-4 flex items-center justify-between border border-outline-variant/30">' + cells.join('') + '</div></div>';
    }

    var disclaimer = '<div class="glass-card rounded-xl p-4 border border-secondary-container/40 flex items-start gap-3">' +
      '<span class="material-symbols-outlined text-secondary-container">warning</span>' +
      '<p class="text-on-surface-variant text-sm leading-relaxed">본 내용은 <span class="text-secondary-container font-bold">현장 참고용</span>이며 법적 효력이 없습니다. 우측 체크리스트는 조문에서 자동 추출된 것으로 누락·오추출 가능성이 있으니, 실제 적용 시 반드시 법령 원문과 안전관리자 등 전문가의 확인을 받으시기 바랍니다.</p></div>';

    // 조문 전문(원문) — 가공 없이 그대로, 줄바꿈 보존
    var original = a.article + '(' + a.title + ') ' + a.body;
    var fullText = '<div class="glass-card rounded-2xl p-8 relative overflow-hidden border-l-4 border-l-tertiary-container">' +
      '<div class="flex items-center gap-2 mb-4 border-b border-outline-variant/20 pb-3">' +
      '<span class="material-symbols-outlined text-tertiary-container">article</span>' +
      '<h3 class="font-title-md text-title-md text-on-surface">조문 전문 (원문)</h3>' +
      '<span class="ml-auto font-data-mono text-[12px] text-outline">' + esc(a.law) + (a.chapter ? ' · ' + esc(a.chapter) : '') + '</span></div>' +
      '<div class="font-body-md text-body-md text-on-surface-variant leading-relaxed" style="white-space:pre-line">' +
      neonNumbers(highlight(original, state.tokens)) + '</div></div>';

    var breakdownLabel = clauses.length > 1
      ? '<div class="font-label-caps text-label-caps text-outline uppercase tracking-widest mt-2">조문 구조 분석 (항·호별)</div>'
      : '';

    document.getElementById('detailView').innerHTML = '' +
      '<div class="glass-card rounded-2xl p-8 border-l-4 border-l-primary-container relative overflow-hidden">' +
      '<div class="relative z-10">' +
      '<div class="flex items-center gap-3 mb-4">' +
      '<span class="material-symbols-outlined text-primary-container text-[32px]">menu_book</span>' +
      '<span class="font-label-caps text-label-caps text-tertiary-container tracking-widest border border-tertiary-container/30 px-3 py-1 rounded-full bg-tertiary-container/10">' + esc(a.law) + '</span>' +
      '</div>' +
      '<h1 class="font-display-xl text-display-xl text-primary mb-2">' + highlight(a.article + ': ' + a.title, state.tokens) + '</h1>' +
      '<p class="font-body-lg text-body-lg text-on-surface-variant">' + subtitle + '</p>' +
      '</div></div>' +
      fullText +
      breakdownLabel +
      '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">' + cards + statBlock + '</div>' +
      disclaimer;
    document.querySelector('.flex-1.overflow-y-auto.p-container-margin').scrollTop = 0;
  }

  function neonNumbers(html) {
    return html.replace(/(\d+(?:\.\d+)?\s*(?:밀리미터|미리미터|센티미터|미터|킬로그램|퍼센트|볼트|와트|럭스|데시벨|시간|개월|일|년|명|배|도)\s*(?:이하|이상|초과|미만|이내)?)/g,
      '<span class="text-primary-container font-bold neon-text-glow">$1</span>');
  }

  // ---------- checklist ----------
  var CURRENT_QUESTS = [];
  function renderChecklist(a) {
    var items = buildChecklist(a);
    CURRENT_QUESTS = items;
    paintQuests();
  }
  function paintQuests() {
    var items = CURRENT_QUESTS;
    var box = document.getElementById('questList');
    if (!items.length) {
      box.innerHTML = '<div class="bg-surface-container-low/50 rounded-lg p-4 border border-outline-variant/30 text-outline text-sm font-data-mono">이 조문에서 자동 추출된 조치 항목이 없습니다.</div>';
      setProgress(0);
      return;
    }
    box.innerHTML = items.map(function (it, i) {
      return questHtml(it, i, !!state.checks[i]);
    }).join('');
    Array.prototype.forEach.call(box.querySelectorAll('.quest-item'), function (el) {
      el.addEventListener('click', function () {
        var i = el.getAttribute('data-i');
        state.checks[i] = !state.checks[i];
        paintQuests();
      });
    });
    updateProgress(items);
  }

  function questHtml(it, i, done) {
    if (done) {
      return '<div class="quest-item bg-surface-container-high/50 rounded-lg p-3 border border-outline-variant/30 flex gap-3 items-start opacity-60 cursor-pointer" data-i="' + i + '">' +
        '<div class="mt-1"><span class="material-symbols-outlined text-outline">check_circle</span></div>' +
        '<div><h5 class="font-label-caps text-label-caps text-outline line-through">' + esc(it.label) + '</h5>' +
        '<p class="text-[10px] text-outline mt-1 font-data-mono">Completed</p></div></div>';
    }
    return '<div class="quest-item bg-surface-container-low/50 rounded-lg p-3 border border-outline-variant/30 flex gap-3 items-start hover:border-tertiary-container/30 transition-colors cursor-pointer" data-i="' + i + '">' +
      '<div class="mt-1"><span class="material-symbols-outlined text-outline">radio_button_unchecked</span></div>' +
      '<div><h5 class="font-label-caps text-label-caps text-on-surface-variant leading-snug">' + esc(it.label) + '</h5>' +
      '<p class="text-[10px] text-outline mt-1 font-data-mono">Pending</p></div></div>';
  }

  function updateProgress(items) {
    var done = 0;
    for (var k in state.checks) { if (state.checks[k]) done++; }
    var pct = items.length ? Math.round(done / items.length * 100) : 0;
    setProgress(pct);
  }
  function setProgress(pct) {
    var C = 351.8;
    document.getElementById('progressRing').setAttribute('stroke-dashoffset', (C * (1 - pct / 100)).toFixed(1));
    document.getElementById('progressText').textContent = pct;
  }

  // ---------- filter menu ----------
  function buildFilterMenu() {
    var menu = document.getElementById('filterMenu');
    var opts = [{ key: 'all', label: '전체', count: ARTICLES.length }].concat(
      LAWS.map(function (l) { return { key: l.key, label: l.short, count: l.count }; }));
    menu.innerHTML = opts.map(function (o) {
      var active = state.filter === o.key;
      return '<button class="filter-opt w-full text-left flex justify-between items-center px-3 py-2 rounded-lg font-label-caps text-label-caps transition-colors ' +
        (active ? 'bg-secondary-container text-on-secondary-container' : 'text-on-surface-variant hover:bg-surface-variant/50') + '" data-key="' + o.key + '">' +
        '<span>' + esc(o.label) + '</span><span class="font-data-mono text-[11px] opacity-80">' + o.count + '</span></button>';
    }).join('');
    Array.prototype.forEach.call(menu.querySelectorAll('.filter-opt'), function (el) {
      el.addEventListener('click', function () {
        state.filter = el.getAttribute('data-key');
        var lbl = opts.filter(function (o) { return o.key === state.filter; })[0].label;
        document.getElementById('filterLabel').textContent = state.filter === 'all' ? '필터' : lbl;
        menu.classList.add('hidden');
        buildFilterMenu();
        search();
      });
    });
  }

  // ---------- view router ----------
  var NAV_INACTIVE = 'nav-link text-on-surface-variant flex items-center gap-xs px-md py-sm hover:text-on-surface hover:bg-surface-variant/50 rounded-full mx-2 transition-all';
  var NAV_ACTIVE = 'nav-link bg-secondary-container text-on-secondary-container rounded-full mx-2 flex items-center gap-xs px-md py-sm shadow-[0_0_15px_rgba(255,94,7,0.4)]';
  var currentView = 'laws';

  function setActiveNav(view) {
    Array.prototype.forEach.call(document.querySelectorAll('.nav-link'), function (el) {
      el.className = (el.getAttribute('data-view') === view) ? NAV_ACTIVE : NAV_INACTIVE;
    });
  }

  function selectedArticle() {
    return ARTICLES.filter(function (x) { return x.id === state.selectedId; })[0];
  }

  function navigate(view) {
    currentView = view;
    setActiveNav(view);
    var isLaws = view === 'laws';
    document.getElementById('searchHeader').classList.toggle('hidden', !isLaws);
    document.getElementById('contentGrid').classList.toggle('hidden', !isLaws);
    var alt = document.getElementById('altView');
    alt.classList.toggle('hidden', isLaws);
    if (!isLaws) {
      alt.innerHTML = renderAltView(view);
      bindAltView(view);
      alt.scrollTop = 0;
    }
    // 화면이 그려진 뒤 GPT로 페이지 내용 검증 → 우측 상단 배지 갱신
    clearTimeout(verifyTimer);
    verifyTimer = setTimeout(function () { verifyPage(view); }, 350);
  }

  function goSearch(query) {
    var input = document.getElementById('searchInput');
    input.value = query;
    state.tokens = tokenize(query);
    navigate('laws');
    search();
  }
  function goFilter(key) {
    state.filter = key;
    var law = LAWS.filter(function (l) { return l.key === key; })[0];
    document.getElementById('filterLabel').textContent = key === 'all' ? '필터' : (law ? law.short : '필터');
    buildFilterMenu();
    navigate('laws');
    search();
  }

  function altHeader(icon, badge, title, subtitle) {
    return '<div class="glass-card rounded-2xl p-8 border-l-4 border-l-primary-container mb-6">' +
      '<div class="flex items-center gap-3 mb-4"><span class="material-symbols-outlined text-primary-container text-[32px]">' + icon + '</span>' +
      '<span class="font-label-caps text-label-caps text-tertiary-container tracking-widest border border-tertiary-container/30 px-3 py-1 rounded-full bg-tertiary-container/10">' + badge + '</span></div>' +
      '<h1 class="font-display-xl text-display-xl text-primary mb-2">' + title + '</h1>' +
      '<p class="font-body-lg text-body-lg text-on-surface-variant">' + subtitle + '</p></div>';
  }

  function renderAltView(view) {
    if (view === 'dashboard') return renderDashboard();
    if (view === 'safety') return renderSafety();
    if (view === 'reports') return renderReports();
    if (view === 'archive') return renderArchive();
    if (view === 'help') return renderHelp();
    return '';
  }

  function renderDashboard() {
    var total = ARTICLES.length;
    var statCards = LAWS.map(function (l, i) {
      var accent = ['primary-container', 'tertiary-container', 'secondary-container', 'primary-container'][i % 4];
      return '<div class="glass-card rounded-xl p-6 relative overflow-hidden">' +
        '<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-' + accent + ' to-transparent opacity-50"></div>' +
        '<div class="font-label-caps text-label-caps text-outline uppercase tracking-widest mb-2">' + esc(l.short) + '</div>' +
        '<div class="font-data-mono text-' + accent + ' text-4xl font-bold neon-text-glow">' + l.count + '</div>' +
        '<div class="text-on-surface-variant text-sm mt-2">' + esc(l.name) + '</div>' +
        '<div class="text-outline font-data-mono text-[11px] mt-1">시행 ' + esc(l.eff || '') + '</div></div>';
    }).join('');
    var chips = QUICK.map(function (q) {
      return '<button class="alt-quick bg-[#080808] border-2 border-tertiary-container/70 text-tertiary-container font-label-caps text-label-caps px-3 py-2 rounded-full hover:bg-tertiary-container/10 hover:border-tertiary-container transition-colors" data-q="' + esc(q) + '">' + esc(q) + '</button>';
    }).join('');
    return '<div class="max-w-5xl mx-auto">' +
      altHeader('dashboard', 'DASHBOARD', '건설안전 법령 현황', '산업안전보건 관련 ' + total + '개 조문을 한 곳에서 검색하고 현장 조치 체크리스트를 확인하세요.') +
      '<div class="glass-card rounded-xl p-6 mb-6 flex items-center justify-between">' +
      '<div class="flex flex-col"><span class="font-label-caps text-label-caps text-outline mb-1">총 조문 수</span>' +
      '<span class="font-data-mono text-primary-container text-5xl font-bold neon-text-glow">' + total + '</span></div>' +
      '<div class="flex flex-col text-right"><span class="font-label-caps text-label-caps text-outline mb-1">포함 법령</span>' +
      '<span class="font-data-mono text-tertiary-container text-5xl font-bold">' + LAWS.length + '</span></div></div>' +
      '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">' + statCards + '</div>' +
      '<div class="glass-card rounded-xl p-6"><div class="font-label-caps text-label-caps text-secondary-container uppercase tracking-widest mb-3">자주 찾는 항목</div>' +
      '<div class="flex flex-wrap gap-2">' + chips + '</div></div></div>';
  }

  function renderSafety() {
    var a = selectedArticle();
    if (!a) {
      return '<div class="max-w-4xl mx-auto">' + altHeader('fact_check', 'SAFETY CHECK', '현장 점검표', '먼저 Laws에서 조문을 검색·선택하면 해당 조문의 현장 조치 체크리스트가 여기에 표시됩니다.') +
        '<button class="alt-goto bg-primary-container text-on-primary-container font-label-caps text-label-caps px-6 py-3 rounded-full" data-view="laws">법령 검색하러 가기</button></div>';
    }
    var items = buildChecklist(a);
    var done = 0; for (var k in state.checks) { if (state.checks[k]) done++; }
    var pct = items.length ? Math.round(done / items.length * 100) : 0;
    var list = items.length ? items.map(function (it, i) {
      var checked = !!state.checks[i];
      return '<div class="alt-quest glass-card rounded-xl p-4 flex gap-3 items-start cursor-pointer ' + (checked ? 'opacity-60 border-outline-variant/30' : 'hover:border-tertiary-container/40') + '" data-i="' + i + '">' +
        '<span class="material-symbols-outlined ' + (checked ? 'text-outline' : 'text-primary-container') + '"' + (checked ? '' : ' style="font-variation-settings:\'FILL\' 1;"') + '>' + (checked ? 'check_circle' : 'radio_button_unchecked') + '</span>' +
        '<div><h5 class="font-title-md text-base ' + (checked ? 'text-outline line-through' : 'text-on-surface') + '">' + esc(it.label) + '</h5></div></div>';
    }).join('') : '<div class="glass-card rounded-xl p-6 text-outline font-data-mono text-sm">이 조문에서 자동 추출된 조치 항목이 없습니다.</div>';
    return '<div class="max-w-4xl mx-auto">' +
      altHeader('fact_check', esc(a.law), a.article + ' 현장 점검표', esc(a.title)) +
      '<div class="glass-card rounded-xl p-6 mb-6 flex items-center justify-between"><div><span class="font-label-caps text-label-caps text-outline">점검 진행률</span>' +
      '<div class="font-data-mono text-primary-container text-3xl font-bold neon-text-glow"><span id="altPct">' + pct + '</span>%</div></div>' +
      '<button id="altPrint" class="bg-transparent border border-primary-container text-primary-container font-label-caps py-3 px-6 rounded-lg hover:bg-primary-container/10 transition-colors uppercase tracking-wider">점검표 인쇄</button></div>' +
      '<div class="flex flex-col gap-3">' + list + '</div>' +
      '<p class="text-outline text-sm mt-6 font-data-mono">※ 참고용이며 법적 효력이 없습니다. 실제 적용 시 법령 원문과 전문가 확인이 필요합니다.</p></div>';
  }

  function renderReports() {
    var a = selectedArticle();
    var body = a ? '<div class="glass-card rounded-xl p-6">' +
      '<div class="font-label-caps text-label-caps text-tertiary-container mb-2">선택된 조문</div>' +
      '<h3 class="font-title-md text-title-md text-primary mb-2">' + esc(a.article + ': ' + a.title) + '</h3>' +
      '<div class="text-on-surface-variant text-sm mb-1">' + esc(a.law) + (a.chapter ? ' · ' + esc(a.chapter) : '') + '</div>' +
      '<p class="text-on-surface-variant text-sm mt-3 leading-relaxed">' + esc(a.body.replace(/\s+/g, ' ').slice(0, 220)) + '…</p>' +
      '<button id="altPrint" class="mt-4 bg-primary-container text-on-primary-container font-label-caps text-label-caps px-6 py-3 rounded-full">보고서 인쇄 / PDF 저장</button></div>'
      : '<div class="glass-card rounded-xl p-6 text-outline font-data-mono text-sm">Laws에서 조문을 선택하면 보고서를 생성할 수 있습니다.</div>';
    return '<div class="max-w-4xl mx-auto">' +
      altHeader('analytics', 'REPORTS', '조문 보고서', '선택한 조문과 현장 조치 체크리스트를 인쇄하거나 PDF로 저장할 수 있습니다.') + body + '</div>';
  }

  function renderArchive() {
    var cards = LAWS.map(function (l) {
      return '<button class="alt-archive glass-card rounded-xl p-6 text-left relative overflow-hidden hover:border-primary-container/50 transition-colors" data-key="' + l.key + '">' +
        '<div class="absolute top-0 right-0 w-16 h-16 bg-primary-container/10 rounded-bl-full -mr-8 -mt-8"></div>' +
        '<span class="font-label-caps text-label-caps text-tertiary-container tracking-widest border border-tertiary-container/30 px-3 py-1 rounded-full bg-tertiary-container/10">' + esc(l.short) + '</span>' +
        '<h3 class="font-title-md text-title-md text-primary mt-4 mb-2">' + esc(l.name) + '</h3>' +
        '<div class="flex items-center gap-6 mt-3"><div><span class="font-label-caps text-label-caps text-outline">조문 수</span>' +
        '<div class="font-data-mono text-primary-container text-2xl font-bold">' + l.count + '</div></div>' +
        '<div><span class="font-label-caps text-label-caps text-outline">시행일</span>' +
        '<div class="font-data-mono text-tertiary-container text-lg font-bold">' + esc(l.eff || '-') + '</div></div></div></button>';
    }).join('');
    return '<div class="max-w-5xl mx-auto">' +
      altHeader('inventory_2', 'ARCHIVE', '법령 아카이브', '법령을 선택하면 해당 법령으로 검색 범위를 좁혀 조문을 둘러볼 수 있습니다.') +
      '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">' + cards + '</div></div>';
  }

  function renderHelp() {
    var rows = [
      ['search', '키워드 검색', '현장 용어(비계, 추락, 굴착 등)를 입력하면 관련 조문을 관련도 순으로 보여줍니다. 여러 단어는 모두 포함(AND) 조건으로 검색됩니다.'],
      ['filter_list', '법령 필터', '필터 버튼으로 전체 / 법 / 시행령 / 시행규칙 / 안전보건규칙 중 범위를 좁힐 수 있습니다.'],
      ['fact_check', '현장 조치 체크리스트', '조문의 의무 문장을 자동 추출해 체크리스트로 만들어 줍니다. 항목을 클릭하면 완료 처리되고 진행률이 갱신됩니다.'],
      ['warning', '면책 안내', '본 도구는 현장 참고용이며 법적 효력이 없습니다. 실제 적용 시 법령 원문과 안전관리자 등 전문가의 확인이 필요합니다.']
    ].map(function (r) {
      return '<div class="glass-card rounded-xl p-6 flex gap-4 items-start"><span class="material-symbols-outlined text-primary-container text-[28px]">' + r[0] + '</span>' +
        '<div><h4 class="font-title-md text-title-md text-on-surface mb-2">' + r[1] + '</h4>' +
        '<p class="text-on-surface-variant leading-relaxed">' + r[2] + '</p></div></div>';
    }).join('');
    return '<div class="max-w-4xl mx-auto">' +
      altHeader('help', 'HELP', '사용 안내', 'LEX-CON 건설안전 법령 검색기 사용 방법입니다.') +
      '<div class="flex flex-col gap-4">' + rows + '</div></div>';
  }

  function bindAltView(view) {
    var alt = document.getElementById('altView');
    Array.prototype.forEach.call(alt.querySelectorAll('.alt-quick'), function (el) {
      el.addEventListener('click', function () { goSearch(el.getAttribute('data-q')); });
    });
    Array.prototype.forEach.call(alt.querySelectorAll('.alt-archive'), function (el) {
      el.addEventListener('click', function () { goFilter(el.getAttribute('data-key')); });
    });
    Array.prototype.forEach.call(alt.querySelectorAll('.alt-goto'), function (el) {
      el.addEventListener('click', function () { navigate('laws'); });
    });
    var print = alt.querySelector('#altPrint');
    if (print) print.addEventListener('click', function () { window.print(); });
    Array.prototype.forEach.call(alt.querySelectorAll('.alt-quest'), function (el) {
      el.addEventListener('click', function () {
        var i = el.getAttribute('data-i');
        state.checks[i] = !state.checks[i];
        navigate('safety');
        // keep the right-panel checklist in sync when returning to Laws
        paintQuests();
      });
    });
  }

  // ---------- GPT 페이지 내용 검증 (우측 상단 배지) ----------
  // 각 화면의 실제 렌더 텍스트를 서버리스 함수(/api/verify)로 보내 GPT가
  // "의도한 내용으로 올바르게 구성됐는지" 판정 → 정상이면 초록색 체크 표시.
  // API 키는 서버(Vercel 환경변수)에서만 사용하며 브라우저에 노출되지 않는다.
  var VERIFY_NAME = { dashboard: 'Dashboard', laws: 'Laws (법령 검색)', safety: 'Safety Check', reports: 'Reports', archive: 'Archive', help: 'Help' };
  var VERIFY_EXPECT = {
    dashboard: '대시보드 제목, 총 조문 수와 포함 법령 수, 법령별 통계 카드, 자주 찾는 항목 키워드 칩',
    laws: '검색 입력창, 검색 결과 목록(건수 표시), 선택된 조문의 전문(원문), 항·호별 구조 분석, 현장 조치 체크리스트',
    safety: '현장 점검표 제목, 점검 진행률(%), 의무 조치 체크리스트(또는 조문 선택 안내)',
    reports: '보고서 제목, 선택된 조문 요약과 인쇄/PDF 저장 버튼(또는 조문 선택 안내)',
    archive: '법령 아카이브 제목, 수록 법령 카드(법령명·조문 수·시행일)',
    help: '사용 안내 제목과 검색·필터·체크리스트·면책 등 기능 설명'
  };
  var verifyCache = {}, verifySeq = 0, verifyTimer = null;
  var PV_BASE = 'flex items-center gap-1.5 px-3 py-1.5 rounded-full border cursor-default select-none transition-all';

  function paneText(view) {
    var parts = [];
    if (view === 'laws') {
      var h = document.getElementById('searchHeader'), g = document.getElementById('contentGrid');
      if (h) parts.push(h.innerText || '');
      if (g) parts.push(g.innerText || '');
    } else {
      var a = document.getElementById('altView');
      if (a) parts.push(a.innerText || '');
    }
    return parts.join(' ').replace(/\s+/g, ' ').trim().slice(0, 6000);
  }

  function setVerifyBadge(status, reason) {
    var box = document.getElementById('pageVerify');
    if (!box) return;
    var icon = document.getElementById('pvIcon'), txt = document.getElementById('pvText');
    box.title = reason || '페이지 내용 검증 (GPT)';
    var map = {
      checking: ['progress_activity', '검증 중…', 'text-on-surface-variant', 'border-outline-variant/40 bg-surface-container-high/60', true],
      ok:       ['check_circle', '정상', 'text-green-400', 'border-green-400/60 bg-green-400/10 shadow-[0_0_12px_rgba(74,222,128,0.45)]', false],
      warn:     ['error', '확인 필요', 'text-amber-400', 'border-amber-400/60 bg-amber-400/10', false],
      off:      ['cloud_off', '검증 불가', 'text-outline', 'border-outline-variant/40 bg-surface-container-high/60', false]
    };
    var m = map[status] || map.off;
    icon.textContent = m[0];
    icon.className = 'material-symbols-outlined text-[18px] ' + m[2] + (m[4] ? ' animate-spin' : '');
    icon.style.fontVariationSettings = "'FILL' 1";
    txt.textContent = m[1];
    txt.className = 'font-label-caps text-[11px] whitespace-nowrap ' + m[2];
    box.className = PV_BASE + ' ' + m[3];
  }

  function applyVerify(d) { setVerifyBadge(d && d.ok ? 'ok' : 'warn', d && d.reason); }

  function verifyPage(view) {
    if (!document.getElementById('pageVerify')) return;
    if (verifyCache[view]) { applyVerify(verifyCache[view]); return; }
    setVerifyBadge('checking');
    var seq = ++verifySeq;
    fetch('/api/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page: VERIFY_NAME[view] || view, expected: VERIFY_EXPECT[view] || '', content: paneText(view) })
    }).then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function (d) {
      if (seq !== verifySeq) return;
      verifyCache[view] = d;
      applyVerify(d);
    }).catch(function () {
      if (seq !== verifySeq) return;
      setVerifyBadge('off', '검증 서버에 연결할 수 없습니다. 배포 환경(Vercel) 또는 `vercel dev`에서만 동작합니다.');
    });
  }

  // ---------- init ----------
  function init() {
    var input = document.getElementById('searchInput');
    var t;
    input.addEventListener('input', function () {
      clearTimeout(t);
      t = setTimeout(function () { state.tokens = tokenize(input.value); search(); }, 120);
    });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { state.tokens = tokenize(input.value); search(); }
    });
    document.getElementById('filterBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      document.getElementById('filterMenu').classList.toggle('hidden');
    });
    document.addEventListener('click', function () {
      document.getElementById('filterMenu').classList.add('hidden');
    });
    document.getElementById('filterMenu').addEventListener('click', function (e) { e.stopPropagation(); });
    document.getElementById('reportBtn').addEventListener('click', function () {
      navigate('reports');
    });
    // sidebar navigation
    Array.prototype.forEach.call(document.querySelectorAll('.nav-link'), function (el) {
      el.addEventListener('click', function (e) {
        e.preventDefault();
        navigate(el.getAttribute('data-view'));
      });
    });
    document.getElementById('newAuditBtn').addEventListener('click', function () {
      goSearch('');
      document.getElementById('searchInput').focus();
    });
    document.getElementById('logoutBtn').addEventListener('click', function (e) {
      e.preventDefault();
      if (window.confirm('데모 환경입니다. 처음 화면으로 돌아갈까요?')) {
        state.filter = 'all';
        document.getElementById('filterLabel').textContent = '필터';
        buildFilterMenu();
        goSearch('');
        navigate('dashboard');
      }
    });
    buildFilterMenu();
    state.tokens = tokenize(input.value);
    search();
    navigate('laws');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else { init(); }
})();
</script>
</body></html>
